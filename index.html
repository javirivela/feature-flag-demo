<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feature Flag Demo — FeatureOps PoC</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1>Feature Flag</h1>
        <p class="subtitle">FeatureOps demo — one config, four users</p>

        <div class="row">
          <label for="enabled">Flag enabled</label>
          <input type="checkbox" id="enabled" checked />
        </div>

        <div class="row">
          <label for="strategy">Activation strategy</label>
          <select id="strategy">
            <option value="on">on (everyone)</option>
            <option value="gradualRollout">gradualRollout (%)</option>
            <option value="userIds">userIds (targeting)</option>
          </select>
        </div>

        <div class="row" id="rolloutRow" style="display: none">
          <label for="percentage">Rollout: <span id="percentageValue">50%</span></label>
          <input type="range" id="percentage" min="0" max="100" value="50" />
        </div>

        <div class="row" id="userIdsRow" style="display: none">
          <label for="userIds">Allowed userIds (comma-separated)</label>
          <input type="text" id="userIds" placeholder="user-1, user-3" value="user-1" />
        </div>

        <hr />
        <p class="hint">
          Each screen on the right is a different user receiving the <strong>same
          deployment</strong>. Change the flag here and watch the feature apply (or
          not) to each user live — that's a gradual rollout.
        </p>
      </aside>

      <main class="screens" id="screens"></main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
