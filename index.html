<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feature Flag Demo — FeatureOps PoC</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header>
      <h1>Feature Flag Demo</h1>
      <p class="subtitle">A tiny visual playground for feature management (FeatureOps).</p>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Flag configuration</h2>

        <div class="row">
          <label for="enabled">Flag enabled</label>
          <input type="checkbox" id="enabled" checked />
        </div>

        <div class="row">
          <label for="strategy">Activation strategy</label>
          <select id="strategy">
            <option value="on">on (everyone)</option>
            <option value="gradualRollout">gradualRollout (%)</option>
            <option value="userIds">userIds (targeting)</option>
          </select>
        </div>

        <div class="row" id="rolloutRow" style="display: none">
          <label for="percentage">Rollout %</label>
          <input type="range" id="percentage" min="0" max="100" value="50" />
          <span id="percentageValue">50%</span>
        </div>

        <div class="row" id="userIdsRow" style="display: none">
          <label for="userIds">Allowed userIds</label>
          <input type="text" id="userIds" placeholder="vip-1, vip-2" value="vip-1" />
        </div>

        <hr />

        <div class="row">
          <label for="userId">Current userId (context)</label>
          <input type="text" id="userId" value="user-123" />
        </div>
        <p class="hint" id="bucket"></p>
      </section>

      <section class="panel result">
        <div id="badge" class="badge on">FEATURE ON</div>
        <div id="feature" class="feature on"></div>
      </section>
    </main>

    <footer>
      <p>Change the config and watch the feature flip in real time — same logic an Unleash SDK runs locally.</p>
    </footer>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
